# Plain HTTP — no TLS chicken-and-egg. Host is rewritten by prepare-native-k3s-server.sh
# (127.0.0.1.nip.io -> YOUR_IP.nip.io) when this file lives under k3s/; for GitHub manual use,
# replace the host with ca.<YOUR_INTERNAL_IP>.nip.io or rely on NodePort only.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dsconnector-ca-server
  namespace: cert-manager
  labels:
    app: dsconnector-ca-server
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: ca.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dsconnector-ca-server
                port:
                  number: 80
