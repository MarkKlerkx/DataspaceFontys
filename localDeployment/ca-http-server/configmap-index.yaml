apiVersion: v1
kind: ConfigMap
metadata:
  name: dsconnector-ca-server-index
  namespace: cert-manager
  labels:
    app: dsconnector-ca-server
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <title>Data Space Connector — CA download</title>
      <style>
        body { font-family: system-ui, sans-serif; max-width: 42rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
        code { background: #f4f4f4; padding: 0.15rem 0.35rem; border-radius: 4px; }
        a { font-weight: 600; }
      </style>
    </head>
    <body>
      <h1>Install the cluster CA</h1>
      <p>This file is the <strong>root CA</strong> used by cert-manager for this deployment. Install it on your computer so browsers trust <code>https://*.nip.io</code> services (Keycloak, dashboards, etc.).</p>
      <p><a href="dsconnector-ca.crt">Download dsconnector-ca.crt</a></p>
      <h2>Verify (optional)</h2>
      <p>On the server, compare SHA-256 fingerprint with what your OS shows after import:</p>
      <pre><code>kubectl -n cert-manager get secret ca-secret -o jsonpath='{.data.tls\.crt}' | base64 -d | openssl x509 -noout -fingerprint -sha256</code></pre>
      <h2>Windows</h2>
      <p>Run in an <strong>elevated</strong> Command Prompt or PowerShell (after downloading the file):</p>
      <pre><code>certutil -addstore -f Root dsconnector-ca.crt</code></pre>
    </body>
    </html>
