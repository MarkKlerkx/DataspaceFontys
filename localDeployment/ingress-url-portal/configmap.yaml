apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-url-portal
  namespace: kube-system
data:
  generate.py: |
    import json
    import os
    import base64
    from datetime import datetime, timezone
    import ssl
    import urllib.request
    import urllib.error

    OUT_PATH = os.environ.get("OUT_PATH", "/www/index.html")
    CA_OUT = os.environ.get("CA_OUT", "/www/dsconnector-ca.crt")
    PORTAL_VERSION = os.environ.get("PORTAL_VERSION", "dev")

    API_HOST = os.environ.get("KUBERNETES_SERVICE_HOST", "kubernetes.default.svc")
    API_PORT = os.environ.get("KUBERNETES_SERVICE_PORT", "443")
    API_BASE = f"https://{API_HOST}:{API_PORT}"
    SA_TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    SA_CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

    def api_request(path: str) -> dict:
      with open(SA_TOKEN_PATH, "r", encoding="utf-8") as f:
        token = f.read().strip()
      ctx = ssl.create_default_context(cafile=SA_CA_PATH)
      req = urllib.request.Request(
        API_BASE + path,
        headers={"Authorization": f"Bearer {token}", "Accept": "application/json"},
        method="GET",
      )
      with urllib.request.urlopen(req, context=ctx, timeout=10) as resp:
        return json.loads(resp.read().decode("utf-8"))

    def get_ingresses() -> list[dict]:
      data = api_request("/apis/networking.k8s.io/v1/ingresses")
      return data.get("items", [])

    def get_nodes_internal_ip() -> str | None:
      data = api_request("/api/v1/nodes")
      for n in data.get("items", []):
        for addr in ((n.get("status") or {}).get("addresses") or []):
          if addr.get("type") == "InternalIP" and addr.get("address"):
            return addr["address"]
      return None

    def get_nodeport(ns: str, svc: str) -> int | None:
      try:
        data = api_request(f"/api/v1/namespaces/{ns}/services/{svc}")
        ports = ((data.get("spec") or {}).get("ports") or [])
        if ports and ports[0].get("nodePort"):
          return int(ports[0]["nodePort"])
      except Exception:
        return None
      return None

    def refresh_ca_cert() -> bool:
      # Read cert-manager/ca-secret tls.crt and write it as dsconnector-ca.crt
      try:
        data = api_request("/api/v1/namespaces/cert-manager/secrets/ca-secret")
        b64 = (((data.get("data") or {}).get("tls.crt")) or "")
        if not b64:
          return False
        crt = base64.b64decode(b64.encode("utf-8"))
        os.makedirs(os.path.dirname(CA_OUT), exist_ok=True)
        with open(CA_OUT, "wb") as f:
          f.write(crt)
        return True
      except Exception:
        return False

    def tls_hosts(ing: dict) -> set[str]:
      hosts: set[str] = set()
      tls = (ing.get("spec") or {}).get("tls") or []
      for t in tls:
        for h in (t.get("hosts") or []):
          hosts.add(h)
      return hosts

    def rules_hosts(ing: dict) -> list[str]:
      hosts: list[str] = []
      rules = (ing.get("spec") or {}).get("rules") or []
      for r in rules:
        h = r.get("host")
        if h:
          hosts.append(h)
      return hosts

    def classify(host: str) -> tuple[int, str, str]:
      # Lower sort rank => higher in list
      h = host.lower()
      note = ""
      rank = 100
      label = "Service"

      if "keycloak" in h:
        rank = 0
        label = "Keycloak"
      if h.startswith("dashboard-provider."):
        rank = 1
        label = "Provider dashboard"
        note = "Login: admin / test"
      if h.startswith("dashboard-consumer."):
        rank = 2
        label = "Consumer dashboard"
      return rank, label, note

    def main():
      internal_ip = get_nodes_internal_ip() or ""
      headlamp_port = get_nodeport("kube-system", "my-headlamp")
      headlamp_url = (f"http://{internal_ip}:{headlamp_port}" if internal_ip and headlamp_port else "")
      ca_ok = refresh_ca_cert()

      items = []
      for ing in get_ingresses():
        ns = (ing.get("metadata") or {}).get("namespace", "")
        name = (ing.get("metadata") or {}).get("name", "")
        tls = tls_hosts(ing)
        for host in rules_hosts(ing):
          scheme = "https" if host in tls else "http"
          rank, label, note = classify(host)
          items.append({
            "rank": rank,
            "label": label,
            "namespace": ns,
            "name": name,
            "host": host,
            "url": f"{scheme}://{host}",
            "note": note,
            "scheme": scheme,
          })

      items.sort(key=lambda x: (x["rank"], x["label"], x["host"]))
      now = datetime.now(timezone.utc).astimezone().strftime("%Y-%m-%d %H:%M:%S %Z")

      rows = "\n".join(
        f"<tr>"
        f"<td class='url'><a href='{i['url']}' target='_blank' rel='noreferrer'>{i['url']}</a></td>"
        f"<td class='note'>{i['note']}</td>"
        f"</tr>"
        for i in items
      )

      headlamp_block = ""
      if headlamp_url:
        headlamp_block = f"""
        <div class="card card-headlamp">
          <div class="card-header">
            <div class="card-title">Headlamp</div>
          </div>
          <div class="card-body">
            <div class="card-row"><a href="{headlamp_url}" target="_blank" rel="noreferrer">{headlamp_url}</a></div>
            <div class="card-row">
              <button id="btn-token">Get Headlamp token</button>
              <span id="token-status" class="muted"></span>
            </div>
          <pre id="token-out" class="token" style="display:none;"><code></code></pre>
          </div>
        </div>
        """

      ca_block = f"""
        <div class="card card-tls">
          <div class="card-header">
            <div class="card-title">TLS / Certificates</div>
          </div>
          <div class="card-body">
            <div class="card-row">
              <a href="/dsconnector-ca.crt">Download dsconnector-ca.crt</a>
              <span class="muted">{' (available)' if ca_ok else ' (not available yet: cert-manager/ca-secret missing?)'}</span>
            </div>
            <div class="card-row muted"><strong>Windows (Admin)</strong>: <code>certutil -addstore -f Root dsconnector-ca.crt</code></div>
            <div class="card-row muted"><strong>Verify</strong>: <code>certutil -store Root | findstr /i "selfsigned-ca"</code></div>
            <div class="card-row muted"><strong>Then</strong>: restart your browser.</div>
          </div>
        </div>
      """

      html = f"""<!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>DSC URL Portal</title>
      <style>
        body {{
          font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
          margin: 0;
          color: #e5e7eb;
          background:
            radial-gradient(1200px 600px at 10% -10%, rgba(59,130,246,0.25), transparent 60%),
            radial-gradient(900px 500px at 90% 0%, rgba(16,185,129,0.20), transparent 55%),
            #070b14;
        }}
        header {{ padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,0.10); background: rgba(7,11,20,0.75); backdrop-filter: blur(8px); position: sticky; top: 0; }}
        h1 {{ margin: 0; font-size: 16px; letter-spacing: 0.2px; }}
        .sub {{ margin-top: 6px; font-size: 12px; opacity: 0.75; }}
        main {{ padding: 16px 20px 28px; }}
        .container {{ max-width: 48rem; margin: 0 auto; }}
        .grid {{ display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; margin-bottom: 14px; }}
        .card {{
          background: rgba(255,255,255,0.05);
          border: 1px solid rgba(255,255,255,0.10);
          border-radius: 14px;
          overflow: hidden;
          box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }}
        .card-header {{
          padding: 10px 12px;
          border-bottom: 1px solid rgba(255,255,255,0.10);
          background: linear-gradient(90deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));
        }}
        .card-body {{ padding: 12px; }}
        .card-title {{ font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.9; }}
        .card-row {{ margin-top: 8px; }}
        .card-tls {{ border-color: rgba(16, 185, 129, 0.55); }}
        .card-tls .card-header {{ background: linear-gradient(90deg, rgba(16,185,129,0.22), rgba(255,255,255,0.03)); }}
        .card-headlamp {{ border-color: rgba(59, 130, 246, 0.55); }}
        .card-headlamp .card-header {{ background: linear-gradient(90deg, rgba(59,130,246,0.22), rgba(255,255,255,0.03)); }}
        button {{ background: #2563eb; color: #fff; border: 0; border-radius: 8px; padding: 8px 10px; cursor: pointer; font-weight: 600; }}
        button:disabled {{ opacity: 0.5; cursor: default; }}
        table {{ width: 100%; table-layout: fixed; border-collapse: collapse; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; }}
        th, td {{ text-align: left; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); vertical-align: top; }}
        th {{ font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.8; }}
        td {{ font-size: 13px; }}
        a {{ color: #93c5fd; text-decoration: none; }}
        a:hover {{ text-decoration: underline; }}
        code {{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px; background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 6px; }}
        .note {{ white-space: nowrap; }}
        .url {{ word-break: break-all; }}
        .muted {{ opacity: 0.75; }}
        .token code {{ white-space: pre-wrap; word-break: break-all; }}
        footer {{ margin-top: 10px; font-size: 12px; opacity: 0.7; }}
      </style>
    </head>
    <body>
      <header>
        <h1>DSC URL Portal</h1>
        <div class="sub">Based on Kubernetes Ingress (Traefik). Last refresh: {now}</div>
      </header>
      <main>
        <div class="container">
          <div class="grid">
            {ca_block}
            {headlamp_block}
          </div>
          <table>
            <thead>
              <tr>
                <th style="width: 62%;">URL</th>
                <th style="width: 38%;">Info</th>
              </tr>
            </thead>
            <tbody>
              {rows if rows else "<tr><td colspan='2'>No ingresses found (or missing permissions).</td></tr>"}
            </tbody>
          </table>
          <footer>
            Tip: if you still see certificate warnings, install the cluster CA and restart your browser.
            <span class="muted" style="float:right;">v{PORTAL_VERSION}</span>
          </footer>
        </div>
      </main>
      <script>
        const btn = document.getElementById('btn-token');
        if (btn) {{
          const status = document.getElementById('token-status');
          const out = document.getElementById('token-out');
          const outCode = out.querySelector('code');
          btn.addEventListener('click', async () => {{
            btn.disabled = true;
            status.textContent = ' fetching token...';
            try {{
              const resp = await fetch('/api/headlamp-token');
              const txt = await resp.text();
              out.style.display = 'block';
              outCode.textContent = txt.trim();
              status.textContent = resp.ok ? ' ok' : ' failed';
            }} catch (e) {{
              status.textContent = ' failed';
            }} finally {{
              btn.disabled = false;
            }}
          }});
        }}
      </script>
    </body>
    </html>
    """

      os.makedirs(os.path.dirname(OUT_PATH), exist_ok=True)
      with open(OUT_PATH, "w", encoding="utf-8") as f:
        f.write(html)

    if __name__ == "__main__":
      main()

  server.py: |
    import os
    import threading
    import time
    import json
    import ssl
    import base64
    import urllib.request
    import urllib.error
    from http.server import ThreadingHTTPServer, SimpleHTTPRequestHandler
    from urllib.parse import urlparse

    WWW_DIR = os.environ.get("WWW_DIR", "/www")
    OUT_PATH = os.environ.get("OUT_PATH", f"{WWW_DIR}/index.html")

    API_HOST = os.environ.get("KUBERNETES_SERVICE_HOST", "kubernetes.default.svc")
    API_PORT = os.environ.get("KUBERNETES_SERVICE_PORT", "443")
    API_BASE = f"https://{API_HOST}:{API_PORT}"
    SA_TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    SA_CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

    def write_fallback_index(msg: str):
      os.makedirs(WWW_DIR, exist_ok=True)
      portal_version = os.environ.get("PORTAL_VERSION", "dev")
      html = f"""<!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>DSC URL Portal (starting)</title>
      <style>
        body {{ font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #0b1220; color: #e5e7eb; margin: 0; }}
        main {{ max-width: 48rem; margin: 2rem auto; padding: 0 1rem; }}
        pre {{ background: rgba(255,255,255,0.06); padding: 1rem; border-radius: 10px; overflow: auto; }}
        code {{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }}
      </style>
    </head>
    <body>
      <main>
        <h1>DSC URL Portal is starting…</h1>
        <p>The portal is running, but <code>index.html</code> was not generated yet.</p>
        <p>It will retry every 10 seconds.</p>
        <h2>Last error</h2>
        <pre><code>{msg}</code></pre>
        <p style="opacity:0.7;font-size:12px;margin-top:12px;">v{portal_version}</p>
      </main>
    </body>
    </html>
    """
      with open(OUT_PATH, "w", encoding="utf-8") as f:
        f.write(html)

    def api_post(path: str, payload: dict) -> tuple[int, str]:
      with open(SA_TOKEN_PATH, "r", encoding="utf-8") as f:
        token = f.read().strip()
      ctx = ssl.create_default_context(cafile=SA_CA_PATH)
      data = json.dumps(payload).encode("utf-8")
      req = urllib.request.Request(
        API_BASE + path,
        data=data,
        headers={
          "Authorization": f"Bearer {token}",
          "Content-Type": "application/json",
          "Accept": "application/json",
        },
        method="POST",
      )
      try:
        with urllib.request.urlopen(req, context=ctx, timeout=10) as resp:
          return resp.getcode(), resp.read().decode("utf-8")
      except urllib.error.HTTPError as e:
        return e.code, e.read().decode("utf-8")

    def api_get(path: str) -> tuple[int, str]:
      with open(SA_TOKEN_PATH, "r", encoding="utf-8") as f:
        token = f.read().strip()
      ctx = ssl.create_default_context(cafile=SA_CA_PATH)
      req = urllib.request.Request(
        API_BASE + path,
        headers={"Authorization": f"Bearer {token}", "Accept": "application/json"},
        method="GET",
      )
      try:
        with urllib.request.urlopen(req, context=ctx, timeout=10) as resp:
          return resp.getcode(), resp.read().decode("utf-8")
      except urllib.error.HTTPError as e:
        return e.code, e.read().decode("utf-8")

    def run_generate_loop():
      while True:
        try:
          # run generate in-process so stacktraces show
          import runpy
          runpy.run_path("/app/generate.py", run_name="__main__")
        except Exception as e:
          write_fallback_index(str(e))
        time.sleep(10)

    class Handler(SimpleHTTPRequestHandler):
      def __init__(self, *args, **kwargs):
        super().__init__(*args, directory=WWW_DIR, **kwargs)

      def do_GET(self):
        path = urlparse(self.path).path
        if path == "/dsconnector-ca.crt":
          code, body = api_get("/api/v1/namespaces/cert-manager/secrets/ca-secret")
          if code >= 400:
            self.send_response(code)
            self.send_header("Content-Type", "text/plain; charset=utf-8")
            self.end_headers()
            self.wfile.write((body.strip() + "\n").encode("utf-8"))
            return
          try:
            data = json.loads(body)
            b64 = (((data.get("data") or {}).get("tls.crt")) or "")
            crt = base64.b64decode(b64.encode("utf-8")) if b64 else b""
            if not crt:
              raise ValueError("ca-secret missing data.tls.crt")
            self.send_response(200)
            self.send_header("Content-Type", "application/x-x509-ca-cert")
            self.send_header("Content-Disposition", "attachment; filename=dsconnector-ca.crt")
            self.end_headers()
            self.wfile.write(crt)
          except Exception as e:
            self.send_response(500)
            self.send_header("Content-Type", "text/plain; charset=utf-8")
            self.end_headers()
            self.wfile.write((f"failed to serve ca cert: {e}\n").encode("utf-8"))
          return
        if path == "/api/headlamp-token":
          code, body = api_post(
            "/api/v1/namespaces/kube-system/serviceaccounts/my-headlamp/token",
            {"apiVersion": "authentication.k8s.io/v1", "kind": "TokenRequest"},
          )
          self.send_response(200 if code < 400 else code)
          self.send_header("Content-Type", "text/plain; charset=utf-8")
          self.end_headers()
          try:
            data = json.loads(body)
            token = (((data.get("status") or {}).get("token")) or "").strip()
            if token:
              self.wfile.write((token + "\n").encode("utf-8"))
            else:
              self.wfile.write((body.strip() + "\n").encode("utf-8"))
          except Exception:
            self.wfile.write((body.strip() + "\n").encode("utf-8"))
          return
        return super().do_GET()

    if __name__ == "__main__":
      os.makedirs(WWW_DIR, exist_ok=True)
      # Ensure there's always an index page (avoid directory listing).
      if not os.path.exists(OUT_PATH):
        write_fallback_index("initial generation pending")
      t = threading.Thread(target=run_generate_loop, daemon=True)
      t.start()
      srv = ThreadingHTTPServer(("0.0.0.0", 8080), Handler)
      srv.serve_forever()
