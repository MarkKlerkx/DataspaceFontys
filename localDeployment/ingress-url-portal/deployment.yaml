apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-url-portal
  namespace: kube-system
  labels:
    app: ingress-url-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress-url-portal
  template:
    metadata:
      labels:
        app: ingress-url-portal
    spec:
      serviceAccountName: ingress-url-portal
      containers:
        - name: portal
          image: python:3.12-alpine
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OUT_PATH
              value: /www/index.html
            - name: CA_OUT
              value: /www/dsconnector-ca.crt
            - name: WWW_DIR
              value: /www
            - name: PORTAL_VERSION
              value: "2026-05-04"
          command: ["python3", "/app/server.py"]
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: app
          configMap:
            name: ingress-url-portal

